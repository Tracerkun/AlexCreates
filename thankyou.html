<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent | AlexCreates</title>

  <link rel="stylesheet" href="style.css">

  <meta http-equiv="refresh" content="3;url=https://tracerkun.github.io/AlexCreates/">

  <style>
    .thankyou-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .thankyou-card {
      background: white;
      border-radius: 32px;
      padding: 50px 40px;
      text-align: center;
      box-shadow: 0 15px 30px rgba(79, 70, 229, 0.1);
      border: 1px solid #ece5f5;
      max-width: 500px;
    }

    .thankyou-card h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(145deg, #1e1b2b, #4f46e5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .thankyou-card p {
      color: #403c52;
      font-size: 1.1rem;
      margin-bottom: 25px;
    }

    .countdown {
      margin-top: 15px;
      font-size: 0.9rem;
      color: #6b617c;
    }
  </style>
</head>

<body>

  <div class="thankyou-wrapper">
    <div class="thankyou-card">

      <h1>Message Sent 🚀</h1>

      <p>
        Thanks for reaching out to <strong>AlexCreates</strong>.<br>
        I’ll get back to you as soon as possible.
      </p>

      <a href="https://tracerkun.github.io/AlexCreates/" class="btn btn-primary">
        Go Back Now
      </a>

      <div class="countdown">
        Redirecting to homepage in 3 seconds...
      </div>

    </div>
  </div>

</body>
</html>
